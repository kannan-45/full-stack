<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow — Project Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --border: #2a2a35;
  --text: #e8e8f0;
  --muted: #7070a0;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --green: #2dd4bf;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --radius: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
code, .mono { font-family: 'Space Mono', monospace; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Auth ── */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 30% 50%, #1a0a3a 0%, var(--bg) 60%);
  position: relative;
  overflow: hidden;
}
#auth-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(108,99,255,0.08) 0%, transparent 70%);
  top: -100px; right: -100px;
  pointer-events: none;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
  box-shadow: 0 0 0 1px rgba(108,99,255,0.1), 0 40px 80px rgba(0,0,0,0.5);
}
.auth-logo {
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.auth-logo .dot { color: var(--accent); }
.auth-tagline { color: var(--muted); font-size: 0.85rem; margin-bottom: 30px; font-family: 'Space Mono', monospace; }
.auth-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg); border-radius: 8px; padding: 4px; }
.auth-tab {
  flex: 1; padding: 8px; border: none; background: none; color: var(--muted);
  border-radius: 6px; cursor: pointer; font-family: 'Syne', sans-serif;
  font-weight: 600; font-size: 0.9rem; transition: all .2s;
}
.auth-tab.active { background: var(--accent); color: white; }

/* ── Form Controls ── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}
.form-select option { background: var(--surface); }
.form-textarea { resize: vertical; min-height: 80px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border: none; border-radius: var(--radius);
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem;
  cursor: pointer; transition: all .2s; white-space: nowrap; text-decoration: none;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #7c74ff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,99,255,0.4); }
.btn-danger { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.btn-danger:hover { background: rgba(248,113,113,0.25); }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.btn-block { width: 100%; justify-content: center; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── App Layout ── */
#app { display: flex; height: 100vh; overflow: hidden; }
.hidden { display: none !important; }

/* ── Sidebar ── */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 0;
  overflow: hidden;
}
.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em;
  display: flex; align-items: center; gap: 8px;
}
.sidebar-logo .logo-icon {
  width: 28px; height: 28px; background: var(--accent);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 900; color: white;
}
.sidebar-user {
  margin-top: 12px;
  display: flex; align-items: center; gap: 8px;
}
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.75rem; color: white; flex-shrink: 0;
}
.user-info { min-width: 0; }
.user-name { font-weight: 700; font-size: 0.85rem; truncate: true; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role {
  font-size: 0.65rem; font-family: 'Space Mono', monospace;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px; display: inline-block; margin-top: 1px;
}
.role-admin { background: rgba(108,99,255,0.2); color: var(--accent); }
.role-member { background: rgba(45,212,191,0.2); color: var(--green); }

.sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
.nav-section { margin-bottom: 20px; }
.nav-section-title {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 12px; margin-bottom: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 6px; cursor: pointer;
  font-weight: 600; font-size: 0.88rem;
  color: var(--muted); transition: all .15s;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(108,99,255,0.15); color: var(--accent); }
.nav-icon { font-size: 1rem; width: 18px; text-align: center; }
.nav-badge {
  margin-left: auto; background: var(--accent); color: white;
  font-size: 0.65rem; padding: 1px 6px; border-radius: 10px;
  font-family: 'Space Mono', monospace;
}

.sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }

/* ── Main Content ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  padding: 16px 28px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); flex-shrink: 0;
}
.topbar-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.content { flex: 1; overflow-y: auto; padding: 28px; }

/* ── Cards & Stats ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 18px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  width: 60px; height: 60px; border-radius: 50%;
  top: -20px; right: -10px;
  background: var(--accent-color, var(--accent));
  opacity: 0.1;
}
.stat-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
.stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

/* ── Tables ── */
.table-container {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.table-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.table-title { font-weight: 700; font-size: 1rem; }
table { width: 100%; border-collapse: collapse; }
thead tr { border-bottom: 1px solid var(--border); }
th {
  padding: 10px 16px; text-align: left;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
td { padding: 12px 16px; border-bottom: 1px solid rgba(42,42,53,0.5); font-size: 0.88rem; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 4px;
  font-size: 0.72rem; font-weight: 700;
  font-family: 'Space Mono', monospace; letter-spacing: 0.04em;
}
.badge-todo { background: rgba(112,112,160,0.2); color: var(--muted); }
.badge-in-progress { background: rgba(96,165,250,0.2); color: var(--blue); }
.badge-done { background: rgba(45,212,191,0.2); color: var(--green); }
.badge-high { background: rgba(248,113,113,0.2); color: var(--red); }
.badge-medium { background: rgba(251,191,36,0.2); color: var(--yellow); }
.badge-low { background: rgba(45,212,191,0.2); color: var(--green); }
.badge-admin { background: rgba(108,99,255,0.2); color: var(--accent); }
.badge-member { background: rgba(45,212,191,0.2); color: var(--green); }
.badge-active { background: rgba(45,212,191,0.2); color: var(--green); }
.badge-archived { background: rgba(112,112,160,0.2); color: var(--muted); }

/* ── Project Cards ── */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.project-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; cursor: pointer;
  transition: all .2s; position: relative; overflow: hidden;
}
.project-card::after {
  content: ''; position: absolute;
  left: 0; top: 0; width: 3px; height: 100%;
  background: var(--accent); opacity: 0;
  transition: opacity .2s;
}
.project-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
.project-card:hover::after { opacity: 1; }
.project-card-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
.project-card-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }
.project-card-meta { display: flex; gap: 16px; font-size: 0.78rem; color: var(--muted); margin-bottom: 14px; }
.project-card-meta span { display: flex; align-items: center; gap: 4px; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 2px; transition: width .3s; }

/* ── Task Kanban ── */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.kanban-col {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.kanban-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; font-weight: 700;
}
.kanban-dot { width: 8px; height: 8px; border-radius: 50%; }
.kanban-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; min-height: 200px; }
.task-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; cursor: pointer; transition: all .15s;
}
.task-card:hover { border-color: var(--accent); }
.task-card-title { font-weight: 600; font-size: 0.88rem; margin-bottom: 8px; line-height: 1.3; }
.task-card-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.task-card-project { font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace; }
.task-due { font-size: 0.72rem; }
.task-due.overdue { color: var(--red); }
.task-due.upcoming { color: var(--yellow); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); display: flex; align-items: center;
  justify-content: center; z-index: 1000; padding: 20px;
}
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: none; } }
.modal-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-weight: 800; font-size: 1.1rem; }
.modal-close {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: var(--surface2); color: var(--muted); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

/* ── Alert ── */
.alert {
  padding: 10px 14px; border-radius: var(--radius);
  font-size: 0.85rem; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.alert-error { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
.alert-success { background: rgba(45,212,191,0.15); border: 1px solid rgba(45,212,191,0.3); color: var(--green); }

/* ── Empty State ── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-text { font-size: 0.9rem; }

/* ── Sections ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 1.1rem; font-weight: 700; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; width: fit-content; }
.tab-btn {
  padding: 7px 16px; border: none; background: none; color: var(--muted);
  border-radius: 6px; cursor: pointer; font-family: 'Syne', sans-serif;
  font-weight: 600; font-size: 0.85rem; transition: all .15s;
}
.tab-btn.active { background: var(--accent); color: white; }

/* ── Detail View ── */
.detail-back { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.85rem; cursor: pointer; margin-bottom: 20px; background: none; border: none; font-family: 'Syne', sans-serif; }
.detail-back:hover { color: var(--text); }
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.detail-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; font-size: 0.82rem; color: var(--muted); }

/* ── Multi-select for members ── */
.member-select { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.member-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 10px; background: rgba(108,99,255,0.15);
  border: 1px solid rgba(108,99,255,0.3); border-radius: 20px;
  font-size: 0.78rem; cursor: pointer; transition: all .15s;
}
.member-chip.selected { background: var(--accent); border-color: var(--accent); color: white; }
.member-chip:hover { border-color: var(--accent); }

/* ── Search / Filter ── */
.filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-bar .form-input { max-width: 220px; }

/* ── Overdue highlight ── */
.overdue-row td { color: var(--red) !important; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .kanban { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px;
  font-size: 0.88rem; font-weight: 600;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  z-index: 9999; display: flex; align-items: center; gap: 8px;
  animation: slideIn .3s ease;
  max-width: 320px;
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }
.toast-success { border-left: 3px solid var(--green); }
.toast-error { border-left: 3px solid var(--red); }

/* ── Loading ── */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <span style="background:var(--accent);color:white;width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:1rem;">TF</span>
      TaskFlow
    </div>
    <div class="auth-tagline">// project management & task tracking</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
    </div>
    <div id="auth-error" class="alert alert-error hidden"></div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">Login</button>
      <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--muted)">
        First user to register becomes <strong style="color:var(--accent)">Admin</strong>
      </p>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" class="hidden">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="signup-name" class="form-input" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="signup-password" class="form-input" placeholder="Min 6 characters" />
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select id="signup-role" class="form-select">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button class="btn btn-primary btn-block" onclick="doSignup()">Create Account</button>
    </div>
  </div>
</div>

<!-- ── Main App ── -->
<div id="app" class="hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">TF</div>
        TaskFlow
      </div>
      <div class="sidebar-user">
        <div class="avatar" id="sidebar-avatar" style="background:var(--accent)"></div>
        <div class="user-info">
          <div class="user-name" id="sidebar-name">User</div>
          <span class="user-role" id="sidebar-role-badge">member</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Overview</div>
        <button class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
          <span class="nav-icon">◉</span> Dashboard
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Workspace</div>
        <button class="nav-item" onclick="navigate('projects')" id="nav-projects">
          <span class="nav-icon">▦</span> Projects
        </button>
        <button class="nav-item" onclick="navigate('tasks')" id="nav-tasks">
          <span class="nav-icon">✓</span> All Tasks
        </button>
      </div>
      <div class="nav-section" id="admin-nav">
        <div class="nav-section-title">Admin</div>
        <button class="nav-item" onclick="navigate('users')" id="nav-users">
          <span class="nav-icon">◎</span> Team Members
        </button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="doLogout()" style="color:var(--red);width:100%">
        <span class="nav-icon">⏻</span> Logout
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="page-content"></div>
  </main>
</div>

<!-- ── Modals ── -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const API = '';
let token = localStorage.getItem('tf_token');
let currentUser = JSON.parse(localStorage.getItem('tf_user') || 'null');
let allUsers = [];
let currentProjectId = null;

// ── Utils ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function avatarColor(name) {
  const colors = ['#6c63ff','#ff6584','#2dd4bf','#fbbf24','#60a5fa','#a78bfa'];
  return colors[(name || '').charCodeAt(0) % colors.length];
}

function initials(name) {
  return (name || 'U').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function isOverdue(due) {
  if (!due) return false;
  return new Date(due) < new Date() && new Date(due).toDateString() !== new Date().toDateString();
}

async function api(endpoint, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + endpoint, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Auth ─────────────────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
  document.getElementById('auth-error').classList.add('hidden');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');
  try {
    const res = await api('/api/auth/login', 'POST', { email, password });
    saveAuth(res);
    initApp();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const role = document.getElementById('signup-role').value;
  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');
  try {
    const res = await api('/api/auth/signup', 'POST', { name, email, password, role });
    saveAuth(res);
    initApp();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

function saveAuth(res) {
  token = res.token;
  currentUser = res.user;
  localStorage.setItem('tf_token', token);
  localStorage.setItem('tf_user', JSON.stringify(currentUser));
}

function doLogout() {
  token = null; currentUser = null;
  localStorage.removeItem('tf_token');
  localStorage.removeItem('tf_user');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

// ── App Init ─────────────────────────────────────────────────────────────────
async function initApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  // Sidebar user
  const av = document.getElementById('sidebar-avatar');
  av.textContent = initials(currentUser.name);
  av.style.background = avatarColor(currentUser.name);
  document.getElementById('sidebar-name').textContent = currentUser.name;
  const rb = document.getElementById('sidebar-role-badge');
  rb.textContent = currentUser.role;
  rb.className = `user-role role-${currentUser.role}`;

  // Admin-only nav
  if (currentUser.role !== 'admin') {
    document.getElementById('admin-nav').classList.add('hidden');
  }

  // Load all users for dropdowns
  try { allUsers = await api('/api/users'); } catch {}

  navigate('dashboard');
}

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(page, extra = null) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const navEl = document.getElementById(`nav-${page}`);
  if (navEl) navEl.classList.add('active');

  currentProjectId = null;
  const pages = { dashboard: renderDashboard, projects: renderProjects, tasks: renderTasks, users: renderUsers, projectDetail: renderProjectDetail };
  if (page === 'projectDetail') {
    currentProjectId = extra;
    renderProjectDetail(extra);
  } else if (pages[page]) {
    pages[page]();
  }
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function renderDashboard() {
  setTitle('Dashboard');
  setActions('');
  setContent('<div style="display:flex;align-items:center;gap:10px;color:var(--muted)"><div class="spinner"></div>Loading...</div>');
  try {
    const stats = await api('/api/dashboard');
    let html = `
    <div class="stats-grid">
      <div class="stat-card" style="--accent-color:var(--accent)">
        <div class="stat-label">Projects</div>
        <div class="stat-value">${stats.activeProjects}</div>
        <div class="stat-sub">${stats.totalProjects} total</div>
      </div>
      <div class="stat-card" style="--accent-color:var(--blue)">
        <div class="stat-label">Total Tasks</div>
        <div class="stat-value">${stats.totalTasks}</div>
        <div class="stat-sub">${stats.doneTasks} completed</div>
      </div>
      <div class="stat-card" style="--accent-color:var(--yellow)">
        <div class="stat-label">In Progress</div>
        <div class="stat-value">${stats.inProgressTasks}</div>
        <div class="stat-sub">${stats.todoTasks} todo</div>
      </div>
      <div class="stat-card" style="--accent-color:var(--red)">
        <div class="stat-label">Overdue</div>
        <div class="stat-value" style="color:${stats.overdueTasks > 0 ? 'var(--red)' : 'inherit'}">${stats.overdueTasks}</div>
        <div class="stat-sub">need attention</div>
      </div>
      ${currentUser.role === 'admin' ? `<div class="stat-card" style="--accent-color:var(--green)">
        <div class="stat-label">Team Members</div>
        <div class="stat-value">${stats.totalUsers}</div>
        <div class="stat-sub">total users</div>
      </div>` : ''}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      <div class="table-container">
        <div class="table-header"><div class="table-title">Task Status</div></div>
        <div style="padding:20px">
          ${[
            ['Todo', stats.todoTasks, 'var(--muted)', stats.totalTasks],
            ['In Progress', stats.inProgressTasks, 'var(--blue)', stats.totalTasks],
            ['Done', stats.doneTasks, 'var(--green)', stats.totalTasks],
          ].map(([label, val, color, total]) => `
            <div style="margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.85rem">
                <span>${label}</span><span style="color:${color};font-weight:700">${val}</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" style="width:${total ? Math.round(val/total*100) : 0}%;background:${color}"></div></div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="table-container">
        <div class="table-header"><div class="table-title">Priority Breakdown</div></div>
        <div style="padding:20px">
          ${[
            ['High', stats.tasksByPriority.high, 'var(--red)'],
            ['Medium', stats.tasksByPriority.medium, 'var(--yellow)'],
            ['Low', stats.tasksByPriority.low, 'var(--green)'],
          ].map(([label, val, color]) => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="display:flex;align-items:center;gap:8px">
                <div style="width:8px;height:8px;border-radius:50%;background:${color}"></div>
                <span style="font-size:0.88rem">${label} Priority</span>
              </div>
              <span style="font-weight:800;color:${color}">${val}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="table-container">
      <div class="table-header">
        <div class="table-title">Recent Tasks</div>
        <button class="btn btn-ghost btn-sm" onclick="navigate('tasks')">View All</button>
      </div>
      ${stats.recentTasks.length === 0 ? '<div class="empty"><div class="empty-text">No tasks yet</div></div>' : `
      <table><thead><tr>
        <th>Task</th><th>Project</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Due</th>
      </tr></thead><tbody>
      ${stats.recentTasks.map(t => {
        const over = isOverdue(t.due_date) && t.status !== 'done';
        return `<tr class="${over ? 'overdue-row' : ''}">
          <td style="font-weight:600">${t.title}</td>
          <td style="color:var(--muted);font-size:0.82rem">${t.project_name}</td>
          <td><span class="badge badge-${t.status}">${t.status}</span></td>
          <td><span class="badge badge-${t.priority}">${t.priority}</span></td>
          <td>${t.assignee_name ? `<div style="display:flex;align-items:center;gap:6px"><div class="avatar" style="width:22px;height:22px;font-size:0.6rem;background:${avatarColor(t.assignee_name)}">${initials(t.assignee_name)}</div>${t.assignee_name}</div>` : '<span style="color:var(--muted)">—</span>'}</td>
          <td style="font-size:0.82rem;color:${over ? 'var(--red)' : 'var(--muted)'}">${fmtDate(t.due_date)}</td>
        </tr>`;
      }).join('')}
      </tbody></table>`}
    </div>`;
    setContent(html);
  } catch (e) {
    setContent(`<div class="alert alert-error">${e.message}</div>`);
  }
}

// ── Projects ──────────────────────────────────────────────────────────────────
async function renderProjects() {
  setTitle('Projects');
  setActions(currentUser.role === 'admin' ? `<button class="btn btn-primary btn-sm" onclick="openProjectModal()">＋ New Project</button>` : '');
  setContent('<div style="display:flex;align-items:center;gap:10px;color:var(--muted)"><div class="spinner"></div>Loading...</div>');
  try {
    const projects = await api('/api/projects');
    if (projects.length === 0) {
      setContent('<div class="empty"><div class="empty-icon">▦</div><div class="empty-text">No projects yet.<br>Create your first project to get started.</div></div>');
      return;
    }
    const html = `<div class="projects-grid">${projects.map(p => {
      const pct = p.task_count > 0 ? Math.round(p.done_count / p.task_count * 100) : 0;
      return `<div class="project-card" onclick="navigate('projectDetail', ${p.id})">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div class="project-card-title">${p.name}</div>
          <span class="badge badge-${p.status}">${p.status}</span>
        </div>
        <div class="project-card-desc">${p.description || 'No description'}</div>
        <div class="project-card-meta">
          <span>📋 ${p.task_count} tasks</span>
          <span>👥 ${p.member_count} members</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:0.75rem;color:var(--muted)">
          <span>Progress</span><span>${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="margin-top:12px;font-size:0.72rem;color:var(--muted);font-family:'Space Mono',monospace">by ${p.creator_name} · ${fmtDate(p.created_at)}</div>
      </div>`;
    }).join('')}</div>`;
    setContent(html);
  } catch (e) {
    setContent(`<div class="alert alert-error">${e.message}</div>`);
  }
}

function openProjectModal(project = null) {
  const isEdit = !!project;
  const memberOptions = allUsers.map(u => `
    <div class="member-chip ${isEdit && project._memberIds && project._memberIds.includes(u.id) ? 'selected' : ''}"
      onclick="toggleMemberChip(this, ${u.id})" data-uid="${u.id}">
      <div class="avatar" style="width:18px;height:18px;font-size:0.6rem;background:${avatarColor(u.name)}">${initials(u.name)}</div>
      ${u.name}
    </div>`).join('');

  openModal(isEdit ? 'Edit Project' : 'New Project', `
    <div class="form-group">
      <label class="form-label">Project Name *</label>
      <input type="text" id="proj-name" class="form-input" value="${isEdit ? project.name : ''}" placeholder="e.g. Website Redesign" />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="proj-desc" class="form-textarea" placeholder="What's this project about?">${isEdit ? (project.description || '') : ''}</textarea>
    </div>
    ${isEdit ? `<div class="form-group">
      <label class="form-label">Status</label>
      <select id="proj-status" class="form-select">
        <option value="active" ${project.status === 'active' ? 'selected' : ''}>Active</option>
        <option value="archived" ${project.status === 'archived' ? 'selected' : ''}>Archived</option>
      </select>
    </div>` : ''}
    <div class="form-group">
      <label class="form-label">Team Members</label>
      <div class="member-select">${memberOptions}</div>
    </div>
  `, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="${isEdit ? `saveProject(${project.id})` : 'createProject()'}">${isEdit ? 'Save Changes' : 'Create Project'}</button>
  `);
}

function toggleMemberChip(el, uid) { el.classList.toggle('selected'); }
function getSelectedMembers() {
  return [...document.querySelectorAll('.member-chip.selected')].map(el => parseInt(el.dataset.uid));
}

async function createProject() {
  const name = document.getElementById('proj-name').value.trim();
  const description = document.getElementById('proj-desc').value.trim();
  const memberIds = getSelectedMembers();
  if (!name) { toast('Project name is required', 'error'); return; }
  try {
    await api('/api/projects', 'POST', { name, description, memberIds });
    closeModal(); toast('Project created!'); renderProjects();
  } catch (e) { toast(e.message, 'error'); }
}

async function saveProject(id) {
  const name = document.getElementById('proj-name').value.trim();
  const description = document.getElementById('proj-desc').value.trim();
  const status = document.getElementById('proj-status').value;
  const memberIds = getSelectedMembers();
  try {
    await api(`/api/projects/${id}`, 'PUT', { name, description, status, memberIds });
    closeModal(); toast('Project updated!'); renderProjectDetail(id);
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteProject(id) {
  if (!confirm('Delete this project and all its tasks?')) return;
  try {
    await api(`/api/projects/${id}`, 'DELETE');
    toast('Project deleted'); navigate('projects');
  } catch (e) { toast(e.message, 'error'); }
}

// ── Project Detail ────────────────────────────────────────────────────────────
async function renderProjectDetail(id) {
  setTitle('Project');
  setContent('<div style="display:flex;align-items:center;gap:10px;color:var(--muted)"><div class="spinner"></div>Loading...</div>');
  try {
    const p = await api(`/api/projects/${id}`);
    const pct = p.tasks.length > 0 ? Math.round(p.tasks.filter(t => t.status === 'done').length / p.tasks.length * 100) : 0;
    const today = new Date().toISOString().split('T')[0];

    const adminActions = currentUser.role === 'admin' ? `
      <button class="btn btn-ghost btn-sm" onclick="openEditProject(${id})">✎ Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteProject(${id})">Delete</button>
    ` : '';
    setActions(`${adminActions}<button class="btn btn-primary btn-sm" onclick="openTaskModal(null, ${id})">＋ Add Task</button>`);

    const todo = p.tasks.filter(t => t.status === 'todo');
    const inprog = p.tasks.filter(t => t.status === 'in-progress');
    const done = p.tasks.filter(t => t.status === 'done');

    function taskCards(tasks) {
      if (!tasks.length) return '<div style="color:var(--muted);font-size:0.82rem;text-align:center;padding:20px 0">No tasks</div>';
      return tasks.map(t => {
        const over = isOverdue(t.due_date) && t.status !== 'done';
        return `<div class="task-card" onclick="openTaskModal(${t.id}, ${id})">
          <div class="task-card-title">${t.title}</div>
          <div class="task-card-meta">
            <span class="badge badge-${t.priority}">${t.priority}</span>
            ${t.assignee_name ? `<div style="display:flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--muted)"><div class="avatar" style="width:18px;height:18px;font-size:0.6rem;background:${avatarColor(t.assignee_name)}">${initials(t.assignee_name)}</div>${t.assignee_name}</div>` : ''}
          </div>
          ${t.due_date ? `<div class="task-due ${over ? 'overdue' : ''}" style="margin-top:6px;font-size:0.72rem">📅 ${fmtDate(t.due_date)}${over ? ' ⚠ Overdue' : ''}</div>` : ''}
        </div>`;
      }).join('');
    }

    const html = `
      <button class="detail-back" onclick="navigate('projects')">← Back to Projects</button>
      <div class="detail-header">
        <div>
          <div class="detail-title">${p.name}</div>
          <div class="detail-meta">
            <span class="badge badge-${p.status}">${p.status}</span>
            <span style="color:var(--muted)">by ${p.creator_name}</span>
            <span style="color:var(--muted)">Created ${fmtDate(p.created_at)}</span>
          </div>
          ${p.description ? `<div style="margin-top:10px;color:var(--muted);font-size:0.88rem">${p.description}</div>` : ''}
        </div>
      </div>

      <div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap">
        <div class="stat-card" style="flex:1;min-width:120px;--accent-color:var(--accent)">
          <div class="stat-label">Total Tasks</div>
          <div class="stat-value">${p.tasks.length}</div>
        </div>
        <div class="stat-card" style="flex:1;min-width:120px;--accent-color:var(--green)">
          <div class="stat-label">Completed</div>
          <div class="stat-value">${pct}%</div>
        </div>
        <div class="stat-card" style="flex:1;min-width:120px;--accent-color:var(--red)">
          <div class="stat-label">Overdue</div>
          <div class="stat-value" style="color:${p.tasks.filter(t=>isOverdue(t.due_date)&&t.status!=='done').length>0?'var(--red)':'inherit'}">${p.tasks.filter(t=>isOverdue(t.due_date)&&t.status!=='done').length}</div>
        </div>
      </div>

      <div class="kanban">
        <div class="kanban-col">
          <div class="kanban-header"><div class="kanban-dot" style="background:var(--muted)"></div>Todo <span style="margin-left:auto;color:var(--muted);font-size:0.8rem">${todo.length}</span></div>
          <div class="kanban-body">${taskCards(todo)}</div>
        </div>
        <div class="kanban-col">
          <div class="kanban-header"><div class="kanban-dot" style="background:var(--blue)"></div>In Progress <span style="margin-left:auto;color:var(--muted);font-size:0.8rem">${inprog.length}</span></div>
          <div class="kanban-body">${taskCards(inprog)}</div>
        </div>
        <div class="kanban-col">
          <div class="kanban-header"><div class="kanban-dot" style="background:var(--green)"></div>Done <span style="margin-left:auto;color:var(--muted);font-size:0.8rem">${done.length}</span></div>
          <div class="kanban-body">${taskCards(done)}</div>
        </div>
      </div>

      <div style="margin-top:24px" class="table-container">
        <div class="table-header"><div class="table-title">👥 Team Members</div>
          ${currentUser.role === 'admin' ? `<button class="btn btn-ghost btn-sm" onclick="openEditProject(${id})">Manage Members</button>` : ''}
        </div>
        <div style="padding:16px;display:flex;flex-wrap:wrap;gap:10px">
          ${p.members.map(m => `<div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);padding:8px 12px;border-radius:8px">
            <div class="avatar" style="background:${avatarColor(m.name)}">${initials(m.name)}</div>
            <div><div style="font-weight:600;font-size:0.88rem">${m.name}</div><div style="font-size:0.72rem;color:var(--muted)">${m.email}</div></div>
            <span class="badge badge-${m.role}">${m.role}</span>
          </div>`).join('')}
        </div>
      </div>`;
    setContent(html);
  } catch (e) {
    setContent(`<div class="alert alert-error">${e.message}</div>`);
  }
}

async function openEditProject(id) {
  const p = await api(`/api/projects/${id}`);
  p._memberIds = p.members.map(m => m.id);
  openProjectModal(p);
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
async function renderTasks() {
  setTitle('All Tasks');
  setActions(`<button class="btn btn-primary btn-sm" onclick="openTaskModal()">＋ New Task</button>`);
  setContent('<div style="display:flex;align-items:center;gap:10px;color:var(--muted)"><div class="spinner"></div>Loading...</div>');
  try {
    const tasks = await api('/api/tasks');
    const statusFilter = (s) => s ? tasks.filter(t => t.status === s) : tasks;

    function renderTaskTable(list) {
      if (!list.length) return '<div class="empty"><div class="empty-icon">✓</div><div class="empty-text">No tasks here</div></div>';
      return `<table><thead><tr>
        <th>Title</th><th>Project</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Due Date</th><th>Actions</th>
      </tr></thead><tbody>
      ${list.map(t => {
        const over = isOverdue(t.due_date) && t.status !== 'done';
        return `<tr class="${over ? 'overdue-row' : ''}">
          <td style="font-weight:600">${t.title}</td>
          <td style="color:var(--muted);font-size:0.82rem">${t.project_name}</td>
          <td><span class="badge badge-${t.status}">${t.status}</span></td>
          <td><span class="badge badge-${t.priority}">${t.priority}</span></td>
          <td>${t.assignee_name ? `<div style="display:flex;align-items:center;gap:6px"><div class="avatar" style="width:22px;height:22px;font-size:0.6rem;background:${avatarColor(t.assignee_name)}">${initials(t.assignee_name)}</div>${t.assignee_name}</div>` : '<span style="color:var(--muted)">Unassigned</span>'}</td>
          <td style="font-size:0.82rem;color:${over ? 'var(--red)' : 'var(--muted)'}">${fmtDate(t.due_date)}${over ? ' ⚠' : ''}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="openTaskModal(${t.id})">Edit</button></td>
        </tr>`;
      }).join('')}
      </tbody></table>`;
    }

    const html = `
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this, 'all-tasks')">All (${tasks.length})</button>
        <button class="tab-btn" onclick="switchTab(this, 'todo-tasks')">Todo (${tasks.filter(t=>t.status==='todo').length})</button>
        <button class="tab-btn" onclick="switchTab(this, 'inprog-tasks')">In Progress (${tasks.filter(t=>t.status==='in-progress').length})</button>
        <button class="tab-btn" onclick="switchTab(this, 'done-tasks')">Done (${tasks.filter(t=>t.status==='done').length})</button>
        <button class="tab-btn" onclick="switchTab(this, 'overdue-tasks')" style="color:var(--red)">Overdue (${tasks.filter(t=>isOverdue(t.due_date)&&t.status!=='done').length})</button>
      </div>
      <div id="all-tasks" class="tab-content table-container">${renderTaskTable(tasks)}</div>
      <div id="todo-tasks" class="tab-content table-container hidden">${renderTaskTable(tasks.filter(t=>t.status==='todo'))}</div>
      <div id="inprog-tasks" class="tab-content table-container hidden">${renderTaskTable(tasks.filter(t=>t.status==='in-progress'))}</div>
      <div id="done-tasks" class="tab-content table-container hidden">${renderTaskTable(tasks.filter(t=>t.status==='done'))}</div>
      <div id="overdue-tasks" class="tab-content table-container hidden">${renderTaskTable(tasks.filter(t=>isOverdue(t.due_date)&&t.status!=='done'))}</div>
    `;
    setContent(html);
  } catch (e) { setContent(`<div class="alert alert-error">${e.message}</div>`); }
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  btn.classList.add('active');
  document.getElementById(tabId)?.classList.remove('hidden');
}

async function openTaskModal(taskId = null, preProjectId = null) {
  let task = null;
  if (taskId) {
    task = await api(`/api/tasks/${taskId}`);
  }
  const projects = await api('/api/projects');

  const projectOpts = projects.map(p =>
    `<option value="${p.id}" ${(task?.project_id === p.id || preProjectId === p.id) ? 'selected' : ''}>${p.name}</option>`
  ).join('');

  const userOpts = `<option value="">Unassigned</option>` + allUsers.map(u =>
    `<option value="${u.id}" ${task?.assigned_to === u.id ? 'selected' : ''}>${u.name}</option>`
  ).join('');

  const canEditAll = currentUser.role === 'admin' || !task || task.created_by === currentUser.id;

  openModal(task ? 'Edit Task' : 'New Task', `
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input type="text" id="task-title" class="form-input" value="${task?.title || ''}" placeholder="Task title" ${!canEditAll && task ? 'readonly' : ''} />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="task-desc" class="form-textarea" placeholder="Details..." ${!canEditAll && task ? 'readonly' : ''}>${task?.description || ''}</textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="task-status" class="form-select">
          <option value="todo" ${task?.status === 'todo' ? 'selected' : ''}>Todo</option>
          <option value="in-progress" ${task?.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
          <option value="done" ${task?.status === 'done' ? 'selected' : ''}>Done</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select id="task-priority" class="form-select" ${!canEditAll && task ? 'disabled' : ''}>
          <option value="low" ${task?.priority === 'low' ? 'selected' : ''}>Low</option>
          <option value="medium" ${task?.priority === 'medium' ? 'selected' : ''}>Medium</option>
          <option value="high" ${task?.priority === 'high' ? 'selected' : ''}>High</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Project *</label>
      <select id="task-project" class="form-select" ${task ? 'disabled' : ''}>
        ${projects.length === 0 ? '<option>No projects available</option>' : projectOpts}
      </select>
    </div>
    ${currentUser.role === 'admin' ? `<div class="form-group">
      <label class="form-label">Assign To</label>
      <select id="task-assignee" class="form-select">${userOpts}</select>
    </div>` : ''}
    <div class="form-group">
      <label class="form-label">Due Date</label>
      <input type="date" id="task-due" class="form-input" value="${task?.due_date || ''}" ${!canEditAll && task ? 'disabled' : ''} />
    </div>
  `,
  `
    ${task && (currentUser.role === 'admin' || task.created_by === currentUser.id) ? `<button class="btn btn-danger btn-sm" style="margin-right:auto" onclick="deleteTask(${task.id})">Delete</button>` : ''}
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="${task ? `saveTask(${task.id})` : 'createTask()'}">${task ? 'Save' : 'Create Task'}</button>
  `);
}

async function createTask() {
  const title = document.getElementById('task-title').value.trim();
  const description = document.getElementById('task-desc').value.trim();
  const status = document.getElementById('task-status').value;
  const priority = document.getElementById('task-priority').value;
  const project_id = document.getElementById('task-project').value;
  const assigned_to = document.getElementById('task-assignee')?.value || null;
  const due_date = document.getElementById('task-due').value || null;
  if (!title || !project_id) { toast('Title and project required', 'error'); return; }
  try {
    await api('/api/tasks', 'POST', { title, description, status, priority, project_id, assigned_to: assigned_to || null, due_date });
    closeModal(); toast('Task created!');
    if (currentProjectId) renderProjectDetail(currentProjectId);
    else renderTasks();
  } catch (e) { toast(e.message, 'error'); }
}

async function saveTask(id) {
  const title = document.getElementById('task-title').value.trim();
  const description = document.getElementById('task-desc').value.trim();
  const status = document.getElementById('task-status').value;
  const priority = document.getElementById('task-priority').value;
  const assigned_to = document.getElementById('task-assignee')?.value || null;
  const due_date = document.getElementById('task-due').value || null;
  try {
    await api(`/api/tasks/${id}`, 'PUT', { title, description, status, priority, assigned_to: assigned_to || null, due_date });
    closeModal(); toast('Task updated!');
    if (currentProjectId) renderProjectDetail(currentProjectId);
    else renderTasks();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await api(`/api/tasks/${id}`, 'DELETE');
    closeModal(); toast('Task deleted');
    if (currentProjectId) renderProjectDetail(currentProjectId);
    else renderTasks();
  } catch (e) { toast(e.message, 'error'); }
}

// ── Users ─────────────────────────────────────────────────────────────────────
async function renderUsers() {
  setTitle('Team Members');
  setActions('');
  setContent('<div style="display:flex;align-items:center;gap:10px;color:var(--muted)"><div class="spinner"></div>Loading...</div>');
  try {
    const users = await api('/api/users');
    const html = `<div class="table-container">
      <div class="table-header"><div class="table-title">All Users (${users.length})</div></div>
      <table><thead><tr>
        <th>Name</th><th>Email</th><th>Role</th><th>Joined</th>
        ${currentUser.role === 'admin' ? '<th>Actions</th>' : ''}
      </tr></thead><tbody>
      ${users.map(u => `<tr>
        <td><div style="display:flex;align-items:center;gap:8px">
          <div class="avatar" style="background:${avatarColor(u.name)}">${initials(u.name)}</div>
          <span style="font-weight:600">${u.name}</span>
          ${u.id === currentUser.id ? '<span style="font-size:0.7rem;color:var(--accent);background:rgba(108,99,255,0.1);padding:2px 6px;border-radius:4px">You</span>' : ''}
        </div></td>
        <td style="font-family:monospace;font-size:0.85rem;color:var(--muted)">${u.email}</td>
        <td><span class="badge badge-${u.role}">${u.role}</span></td>
        <td style="font-size:0.82rem;color:var(--muted)">${fmtDate(u.created_at)}</td>
        ${currentUser.role === 'admin' ? `<td>
          <div style="display:flex;gap:6px">
            ${u.id !== currentUser.id ? `
              <select class="form-select" style="width:auto;font-size:0.8rem;padding:4px 8px" onchange="changeRole(${u.id}, this.value)">
                <option value="member" ${u.role==='member'?'selected':''}>Member</option>
                <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
              </select>
              <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Remove</button>
            ` : '<span style="color:var(--muted);font-size:0.8rem">—</span>'}
          </div>
        </td>` : ''}
      </tr>`).join('')}
      </tbody></table>
    </div>`;
    setContent(html);
  } catch (e) { setContent(`<div class="alert alert-error">${e.message}</div>`); }
}

async function changeRole(userId, role) {
  try {
    await api(`/api/users/${userId}/role`, 'PATCH', { role });
    toast('Role updated!'); renderUsers();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteUser(userId) {
  if (!confirm('Remove this user?')) return;
  try {
    await api(`/api/users/${userId}`, 'DELETE');
    toast('User removed'); renderUsers();
    allUsers = await api('/api/users');
  } catch (e) { toast(e.message, 'error'); }
}

// ── Modal Helpers ─────────────────────────────────────────────────────────────
function openModal(title, body, footer) {
  document.getElementById('modal-title').innerHTML = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.add('hidden');
}

// ── Page Helpers ──────────────────────────────────────────────────────────────
function setTitle(t) { document.getElementById('page-title').textContent = t; }
function setActions(html) { document.getElementById('topbar-actions').innerHTML = html; }
function setContent(html) { document.getElementById('page-content').innerHTML = html; }

// ── Bootstrap ─────────────────────────────────────────────────────────────────
if (token && currentUser) {
  initApp();
} else {
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}
</script>
</body>
</html>
